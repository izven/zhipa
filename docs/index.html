<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="智慧强安 - 汇聚全球一线安全热点资讯，深耕安全生产数字化服务领域">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>安装 - iOS OTA</title>

  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/animation.css">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📲</text></svg>">
  <link rel="apple-touch-icon" href="images/app-logo.png">
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="切换主题">🌓</button>

  <!-- Unsupported Overlay (hidden by default) -->
  <div id="unsupportedOverlay" style="display:none;position:fixed;inset:0;z-index:50;background:var(--color-bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;">
    <div style="text-align:center;max-width:360px;">
      <div id="overlayIcon" style="font-size:64px;margin-bottom:20px;">📱</div>
      <h2 id="overlayTitle" style="font-size:22px;font-weight:700;margin-bottom:12px;">请使用 Safari 打开</h2>
      <p id="overlayDesc" style="font-size:15px;color:var(--color-text-secondary);line-height:1.7;"></p>
    </div>
  </div>

  <main class="container">
    <!-- Header -->
    <header class="app-header animate-fade-in">
      <div class="app-icon">
        <img src="images/app-logo.png" alt="智慧强安">
      </div>
      <h1 class="app-name" data-app-name>智慧强安</h1>
      <p class="app-version" data-version>v0.0.0</p>
    </header>

    <!-- App Info (Static) -->
    <section class="card animate-fade-in-up delay-1">
      <h2 class="card-title">应用信息</h2>
      <p style="font-size:15px;color:var(--color-text-secondary);line-height:1.7;">汇聚全球一线安全热点资讯，深耕安全生产数字化服务领域</p>
    </section>

    <!-- Install Button -->
    <a id="installBtn" class="btn-install" href="#" disabled style="display:flex;margin:8px auto 16px;">
      <span class="spinner"></span>
      <span class="btn-text">立即安装</span>
    </a>

    <!-- Release Notes -->
    <section class="card animate-fade-in-up delay-4">
      <h2 class="card-title">更新内容</h2>
      <div id="releaseNotes" class="release-notes">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
      </div>
    </section>

    <!-- Instructions -->
    <section class="card animate-fade-in-up delay-5">
      <h2 class="card-title">安装步骤</h2>
      <ol class="instruction-steps">
        <li class="instruction-step">
          点击「立即安装」，弹出提示后点击「<strong>允许</strong>」
        </li>
        <li class="instruction-step">
          安装完成后，前往 <strong>设置 → 通用 → VPN 与设备管理</strong>
        </li>
        <li class="instruction-step">
          找到对应的开发者证书，点击「<strong>信任</strong>」
        </li>
        <li class="instruction-step">
          返回桌面即可打开应用
        </li>
      </ol>
    </section>

    <!-- Troubleshooting -->
    <section class="card animate-fade-in-up delay-6">
      <h2 class="card-title">常见问题</h2>
      <div style="font-size:14px;color:var(--color-text-secondary);line-height:1.8;">
        <p><strong style="color:var(--color-text);">安装失败？</strong></p>
        <p>请确保设备和证书均受信任，检查设置中的设备管理描述文件。</p>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/browser.js"></script>
  <script src="js/version.js"></script>
  <script src="js/install.js"></script>
</body>
</html>
