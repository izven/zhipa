name: Release & Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Generate manifest.plist
        run: |
          cat > docs/manifest.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>https://github.com/${{ steps.version.outputs.owner }}/${{ steps.version.outputs.repo }}/releases/latest/download/zhqa.ipa</string>
                  </dict>
                  <dict>
                    <key>kind</key>
                    <string>display-image</string>
                    <key>url</key>
                    <string>https://${{ steps.version.outputs.owner }}.github.io/${{ steps.version.outputs.repo }}/images/app-logo.png</string>
                    <key>needs-exposure</key>
                    <true/>
                  </dict>
                  <dict>
                    <key>kind</key>
                    <string>full-size-image</string>
                    <key>url</key>
                    <string>https://${{ steps.version.outputs.owner }}.github.io/${{ steps.version.outputs.repo }}/images/banner.png</string>
                    <key>needs-exposure</key>
                    <true/>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>${{ vars.BUNDLE_ID || 'com.demlution.iatianfangyetan' }}</string>
                  <key>bundle-version</key>
                  <string>${{ steps.version.outputs.version }}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>${{ vars.APP_NAME || '智慧强安' }}</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

      - name: Commit manifest.plist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/manifest.plist
          git diff --staged --quiet || git commit -m "chore: update manifest for ${{ steps.version.outputs.tag }} [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
